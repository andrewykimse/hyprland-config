monitor = eDP-1, preferred, auto, 2
monitor = , preferred, auto, 1

bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, preferred, auto, 2"

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_DATA_DIRS
exec-once = systemctl --user restart xdg-desktop-portal
exec-once = hyprpaper
exec-once = hypridle
exec-once = wl-paste --watch cliphist store
exec-once = systemctl --user start hyprpolkitagent

animations {
    enabled = true
    bezier = snap, 0.05, 0.9, 0.1, 1.0
    animation = windows, 1, 2, snap
    animation = windowsOut, 1, 2, snap, popin 80%
    animation = windowsMove, 1, 2, snap
    animation = workspaces, 1, 2, snap
    animation = fade, 1, 2, default
    animation = border, 1, 8, default
}

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(bd93f9ee) rgba(ff79c6ee) 45deg
    col.inactive_border = rgba(44475aaa)
    layout = dwindle
}

decoration {
    rounding = 6
    blur {
        enabled = true
    }
}

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

bind = $mod, Return, exec, $terminal
bind = $mod, Q, killactive,
bind = $mod SHIFT, E, exit,
bind = $mod, Space, exec, noctalia-shell ipc call launcher toggle
bind = $mod, V, togglefloating,
bind = $mod, F, fullscreen,

bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

bind = $mod CTRL, h, movewindow, l
bind = $mod CTRL, l, movewindow, r
bind = $mod CTRL, k, movewindow, u
bind = $mod CTRL, j, movewindow, d

bind = $mod, Escape, exec, $lock
bind = $mod SHIFT, V, exec, noctalia-shell ipc call launcher clipboard

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

binde = $mod SHIFT, h, resizeactive, -30 0
binde = $mod SHIFT, l, resizeactive, 30 0
binde = $mod SHIFT, k, resizeactive, 0 -30
binde = $mod SHIFT, j, resizeactive, 0 30

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-
